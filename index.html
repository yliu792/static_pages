<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的第一个 GitHub Pages Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .row {
        margin-top: 1.4rem;
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1.1rem;
        background: var(--accent);
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }

      .ghost {
        background: #e8f7f5;
        color: #115e59;
      }

      #msg {
        margin-top: 1rem;
        font-weight: 600;
        color: #0f766e;
        min-height: 1.5em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>你好，GitHub Pages</h1>
      <p>这是你的第一个 demo 页面。</p>
      <p>你已经成功迈出第一步了。</p>

      <div class="row">
        <button id="helloBtn">点我打招呼</button>
        <button id="timeBtn" class="ghost">显示当前时间</button>
      </div>

      <div id="msg"></div>

      <div class="nav">
        <a href="tips.html">终端小技巧</a>
        <span> · </span>
        <a href="fun-facts.html">终端冷知识</a>
        <span> · </span>
        <a href="shuangpin.html">微软双拼键盘图 &rarr;</a>
      </div>
    </main>

    <script>
      const msg = document.getElementById("msg");
      const helloBtn = document.getElementById("helloBtn");
      const timeBtn = document.getElementById("timeBtn");

      helloBtn.addEventListener("click", () => {
        msg.textContent = "欢迎来到你的网站！";
      });

      timeBtn.addEventListener("click", () => {
        const now = new Date();
        msg.textContent = `现在时间：${now.toLocaleString("zh-CN")}`;
      });
    </script>
  </body>
</html>
